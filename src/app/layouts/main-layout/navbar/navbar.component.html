<nav
  class="relative overflow-visible flex items-center justify-between gap-[1.1rem] rounded-[1.35rem] border border-slate-200/10 bg-[radial-gradient(circle_at_top_left,_rgba(51,65,85,0.45),_transparent_34%),radial-gradient(circle_at_bottom_right,_rgba(30,58,138,0.38),_transparent_32%),linear-gradient(135deg,_rgba(15,23,42,0.96)_0%,_rgba(30,41,59,0.94)_100%)] px-[1.2rem] py-3 shadow-[0_18px_40px_rgba(2,6,23,0.34)] max-[700px]:flex-col max-[700px]:items-stretch max-[700px]:px-4 max-[700px]:py-[0.85rem]"
>
  <div class="flex min-w-0 items-center gap-3">
    <div
      class="grid h-[2.85rem] w-[2.85rem] place-items-center overflow-hidden rounded-[0.9rem] border border-white/10 bg-white shadow-[0_10px_22px_rgba(15,23,42,0.32)]"
    >
      <img src="/Images/examly-logo.jpg" alt="Examly logo" />
    </div>
    <div>
      <p class="m-0 text-[0.72rem] font-bold uppercase tracking-[0.16em] text-slate-400">
        Smart exam space
      </p>
      <h1 class="m-0 text-[1.5rem] font-extrabold leading-[1.05] tracking-[-0.04em] text-slate-50">
        Examly
      </h1>
    </div>
  </div>

  <div
    class="flex flex-wrap items-center justify-center gap-2 rounded-[1.1rem] border border-slate-200/10 bg-white/6 px-3 py-2 backdrop-blur-[10px]"
  >
    <a
      [routerLink]="baseRoute + '/home'"
      routerLinkActive="bg-slate-100 text-slate-900 shadow-[0_8px_18px_rgba(15,23,42,0.22)]"
      [routerLinkActiveOptions]="{ exact: true }"
      class="rounded-full px-4 py-2 text-sm font-semibold text-slate-200 transition hover:bg-white/10 hover:text-white"
    >
      Home
    </a>
    <a
      [routerLink]="baseRoute + '/exams'"
      routerLinkActive="bg-slate-100 text-slate-900 shadow-[0_8px_18px_rgba(15,23,42,0.22)]"
      [routerLinkActiveOptions]="{ exact: true }"
      class="rounded-full px-4 py-2 text-sm font-semibold text-slate-200 transition hover:bg-white/10 hover:text-white"
    >
      Exams
    </a>
    <a
      [routerLink]="baseRoute + '/groups'"
      routerLinkActive="bg-slate-100 text-slate-900 shadow-[0_8px_18px_rgba(15,23,42,0.22)]"
      [routerLinkActiveOptions]="{ exact: true }"
      class="rounded-full px-4 py-2 text-sm font-semibold text-slate-200 transition hover:bg-white/10 hover:text-white"
    >
      Groups
    </a>
  </div>

  <div
    class="relative z-10 flex items-center gap-3 rounded-[1.1rem] border border-slate-200/10 bg-white/8 px-[0.9rem] py-2 backdrop-blur-[10px] max-[700px]:justify-between"
  >
    <div class="text-right max-[700px]:text-left">
      <span
        class="mb-[0.3rem] inline-block rounded-full bg-white/10 px-[0.65rem] py-[0.24rem] text-[0.67rem] font-bold uppercase tracking-[0.08em] text-slate-200"
      >
        {{ roleLabel }}
      </span>

      <h2 class="m-0 text-base font-bold leading-[1.2] text-slate-50">{{ fullName }}</h2>
    </div>

    <div
      class="h-[3.3rem] w-[3.3rem] shrink-0 rounded-2xl bg-[linear-gradient(180deg,_#334155_0%,_#1e3a8a_70%,_#0f172a_100%)] p-[0.16rem] shadow-[0_10px_22px_rgba(15,23,42,0.28)]"
    >
      <img
        class="block h-full w-full rounded-[0.86rem] object-cover"
        [src]="avatarPath"
        [alt]="roleLabel + ' profile image'"
      />
    </div>
    <div class="relative shrink-0" (click)="keepMenuOpen($event)">
      <button
        type="button"
        (click)="toggleMenu($event)"
        aria-label="Open account menu"
        title="Account menu"
        class="grid h-11 w-11 place-items-center rounded-full border border-slate-200/10 bg-white/8 text-slate-200 shadow-[0_10px_22px_rgba(15,23,42,0.2)] transition hover:border-slate-200/20 hover:bg-white/14 hover:text-white"
      >
        <i class="fa-solid fa-ellipsis-vertical text-sm"></i>
      </button>

      <div
        [class.hidden]="!isMenuOpen"
        class="absolute right-0 top-full z-50 mt-3 w-52 origin-top-right overflow-hidden rounded-2xl border border-slate-200/10 bg-slate-800/95 p-2 shadow-[0_24px_48px_rgba(2,6,23,0.45)] backdrop-blur-xl"
      >
        <button
          type="button"
          (click)="openUpdateProfile()"
          class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-left text-sm font-semibold text-slate-100 transition hover:bg-white/10 hover:text-white"
        >
          <i class="fa-solid fa-user-pen text-xs"></i>
          Edit profile
        </button>

        <button
          type="button"
          (click)="logout()"
          class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-left text-sm font-semibold text-slate-100 transition hover:bg-white/10 hover:text-white"
        >
          <i class="fa-solid fa-right-from-bracket text-xs"></i>
          Logout
        </button>

        <button
          type="button"
          (click)="confirmDeleteAccount()"
          class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-left text-sm font-semibold text-rose-200 transition hover:bg-rose-500/15 hover:text-rose-100"
        >
          <i class="fa-solid fa-user-xmark text-xs"></i>
          Delete account
        </button>
      </div>
    </div>
  </div>
</nav>
